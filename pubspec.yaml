name: enthusiast
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  lucide_icons: 0.257.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  intl: ^0.19.0
  dio: ^5.4.0
  provider: ^6.0.7
  http: ^1.2.0
  google_sign_in: ^6.2.1
  google_sign_in_web: ">=0.12.0 <1.0.0"
  firebase_auth: ^5.3.1
  cloud_functions: ^5.1.3
  shared_preferences: ^2.2.0
  file_picker: 8.3.7
  image_picker: ^1.0.7
  crypto: ^3.0.3
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  assets:
    - assets/schedule.json
    - assets/graduation_data.json
    - assets/email.json
    - assets/upcoming_task.json
    - assets/app_icon.png
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
